  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-weight: 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"757b139b-9d04-4d43-974c-339495427b7e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<title>School Stress, 504 &amp; IEP Help — NJ Parents | Bright Room Therapy<\u002Ftitle>\n<meta name=\"description\" content=\"Support for NJ parents navigating school refusal, 504/IEP meetings, and academic stress — from a former school counselor and 504 coordinator.\">\n<link rel=\"icon\" type=\"image/png\" href=\"51a0660f-6fac-41fb-ab4f-5b95d5da40fd\">\n\n<meta property=\"og:title\" content=\"Parents &amp; School Stress | Bright Room Therapy\">\n<meta property=\"og:description\" content=\"When school becomes the storm, you need someone who knows the building. Therapy for your kid. A translator for you.\">\n<meta property=\"og:image\" content=\"og-image.png\">\n<meta property=\"og:type\" content=\"website\">\n<script type=\"application/ld+json\">\n{\"@context\":\"https://schema.org\",\"@type\":\"FAQPage\",\"mainEntity\":[{\"@type\":\"Question\",\"name\":\"What's the difference between a 504 and an IEP — and which should we ask for?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"A 504 plan provides accommodations (extra time, breaks, seating) for a student who can access the curriculum; an IEP provides specialized instruction and services through special education. Which fits depends on your child's needs and evaluations. I coordinated 504s for six years — I'll help you understand the process, prepare for meetings, and ask for what's actually useful.\"}},{\"@type\":\"Question\",\"name\":\"My kid refuses to go to school. Where do we start?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Gently, and soon — school avoidance gets stronger the longer it runs. We start with a parent call to map what's driving it (anxiety, social pain, learning struggles, something at school). Then a plan: therapy for your kid, a step-wise return approach, and coordination with the school so everyone pulls in the same direction.\"}},{\"@type\":\"Question\",\"name\":\"Do you talk to the school directly?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Only with your written consent — and when it helps. Sometimes that's a call with the counselor, input for a 504 meeting, or helping you write the email that gets a real response. You stay in control of what's shared.\"}}]}\n<\u002Fscript>\n<style>\n*{margin:0;padding:0;box-sizing:border-box;}\nhtml{scroll-behavior:smooth;}\nbody{background:#FAF7F0;}\nsummary::-webkit-details-marker{display:none;}\nimage-slot{display:block;width:100%;height:100%;}\n@media(max-width:760px){.br-nav-links{display:none !important;}}\n@media(min-width:761px){.br-mobile-bar{display:none !important;}}\n@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto;}*{transition:none!important;animation:none!important;}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Parents and School Stress NJ\" style=\"font-family:'Nunito Sans',sans-serif;color:#2E2E2A;background:#FAF7F0;line-height:1.6;font-size:16px;\">\n\n  <!-- STICKY NAV -->\n  <nav style=\"position:sticky;top:0;z-index:50;background:rgba(250,247,240,.94);backdrop-filter:blur(8px);border-bottom:1px solid rgba(201,169,97,.3);\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;max-width:1120px;margin:0 auto;\">\n      <a href=\"Bright Room Therapy.dc.html\" style=\"text-decoration:none;\">\n        <span style=\"display:block;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:21px;color:#3F3F2E;letter-spacing:.5px;\">BRIGHT ROOM THERAPY<\u002Fspan>\n        <span style=\"display:block;font-size:9.5px;letter-spacing:2.5px;color:#A98B45;font-weight:800;\">WITH CHANDNI KAPADIA, LPC<\u002Fspan>\n      <\u002Fa>\n      <div style=\"display: erapy for your kid. A translator for you.<\u002Fp>\n      <div style=\"margin-top:28px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;\">\n        <a href=\"https://care.headway.co/providers/chandni-kapadia-2?utm_source=pem&utm_medium=direct_link&utm_campaign=129002\" style=\"display:inline-flex;align-items:center;min-height:52px;background:#3F3F2E;color:#FDFBF3;font-size:13.5px;font-weight:800;letter-spacing:1.5px;padding:0 34px;border-radius:30px;text-decoration:none;box-shadow:0 8px 24px rgba(63,63,46,.22);\" style-hover=\"background:#5F5F41\" style-focus=\"outline:3px solid #C9A961;outline-offset:3px\">SCHEDULE WHEN YOU'RE READY<\u002Fa>\n        <span style=\"font-size:13px;color:#7D8B74;font-weight:700;max-width:260px;line-height:1.45;\">Insurance accepted via Headway · Superbills provided for PPO plans<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- CREDENTIAL BAR -->\n  <div style=\"background:#FFFFFF;border-top:1px solid rgba(201,169,97,.35);border-bottom:1px solid rgba(201,169,97,.35);\">\n    <div style=\"max-width:1120px;margin:0 auto;display:flex;gap:10px 30px;flex-wrap:wrap;padding:15px 24px;justify-content:center;\">\n      <span style=\"font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;color:#6B7A62;\"><b style=\"color:#C9A961;\">●<\u002Fb> Licensed Professional Counselor (NJ)<\u002Fspan>\n      <span style=\"font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;color:#6B7A62;\"><b style=\"color:#C9A961;\">●<\u002Fb> School counselor &amp; 504 coordinator, 2020–2026<\u002Fspan>\n      <span style=\"font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;color:#6B7A62;\"><b style=\"color:#C9A961;\">●<\u002Fb> Certified Youth Mental Health Specialist<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- RECOGNITION -->\n  <section style=\"padding:76px 0;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 24px;display:flex;flex-wrap:wrap;gap:48px;\">\n      <div style=\"flex:1 1 380px;min-width:0;\">\n        <p style=\"font-size:12px;letter-spacing:4px;text-transform:uppercase;font-weight:800;color:#A98B45;\">Sound familiar?<\u002Fp>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.6vw,40px);font-weight:600;margin-top:10px;text-wrap:pretty;\">You might be here because…<\u002Fh2>\n        <p style=\"font-size:16px;color:#5A5A50;margin-top:14px;max-width:520px;\">You're not overreacting. When school stops working, the whole house feels it — and most parents are handed jargon instead of help.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 420px;min-width:0;display:flex;flex-direction:column;gap:12px;\">\n        <sc-for list=\"{{ signs }}\" as=\"s\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start;background:#FFFFFF;border:1px solid rgba(125,139,116,.25);border-radius:12px;padding:16px 20px;\">\n            <span style=\"flex:0 0 auto;width:10px;height:10px;border-radius:50%;background:#C9A961;margin-top:8px;\"><\u002Fspan>\n            <span style=\"font-size:15px;color:#4A4A40;\">{{ s }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW THERAPY HELPS -->\n  <section style=\"padding:76px 0;background:#F5F0E4;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 24px;\">\n      <p style=\"font-size:12px;letter-spacing:4px;text-transform:uppercase;font-weight:800;color:#A98B45;\">How this works<\u002Fp>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.6vw,40px);font-weight:600;margin-top:10px;\">Help on both sides of the backpack.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:38px;\">\n        <div style=\"background:#FFFFFF;border:1px solid rgba(125,139,116,.25);border-radius:14px;padding:26px;\">\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#3F3F2E;\">Therapy for your student<\u002Fh3>\n          <p style=\"font-size:14.5px;color:#5A5A50;margin-top:10px;\">School avoidance, test panic, perfectionism, the Sunday-night dread. We treat the stress underneath the grades — with practical skills that work in a classroom, not just on a couch.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid rgba(125,139,116,.25);border-radius:14px;padding:26px;\">\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#3F3F2E;\">A translator for the system<\u002Fh3>\n          <p style=\"font-size:14.5px;color:#5A5A50;margin-top:10px;\">504 vs. IEP, CST referrals, accommodations worth asking for, what schools can and can't do — I coordinated this from the inside for six years. With your consent, I help you walk into meetings prepared.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid rgba(125,139,116,.25);border-radius:14px;padding:26px;\">\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#3F3F2E;\">Steadiness for you<\u002Fh3>\n          <p style=\"font-size:14.5px;color:#5A5A50;margin-top:10px;\">Parenting a struggling student is its own kind of exhausting. You get honest guidance on what to push, what to let go, and how to stop being the homework police and start being the parent again.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHY CHANDNI -->\n  <section style=\"padding:76px 0;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 24px;display:flex;flex-wrap:wrap;gap:44px;align-items:center;\">\n      <div style=\"flex:0 1 280px;min-width:240px;\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"b4cb358e-f3b7-42f0-b4ed-3143d59c9056#/image-slot.js\" id=\"parents-page-portrait\" src=\"{{ headshotUrl }}\" placeholder=\"Portrait of Chandni\" shape=\"rounded\" radius=\"16\" style=\"display:block;width:100%;height:340px;\" hint-size=\"280px,340px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 420px;min-width:0;\">\n        <p style=\"font-size:12px;letter-spacing:4px;text-transform:uppercase;font-weight:800;color:#A98B45;\">Why me, for this<\u002Fp>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3.2vw,36px);font-weight:600;margin-top:10px;text-wrap:pretty;\">I sat in the school's chair. Now I sit in yours.<\u002Fh2>\n        <p style=\"font-size:16px;color:#5A5A50;margin-top:14px;\">From 2020–2026 I was a school counselor and 504 coordinator in the West Windsor–Plainsboro schools — one of the most academically intense districts in New Jersey. I ran the meetings parents dread, wrote the plans, and saw exactly where families get lost in the process.<\u002Fp>\n        <p style=\"font-size:16px;color:#5A5A50;margin-top:12px;\">I'm a Columbia-trained Licensed Professional Counselor and Certified Youth Mental Health Specialist. When your kid's school life is on fire, I know both the fire and the building.<\u002Fp>\n        <p style=\"font-size:15px;color:#5A5A50;margin-top:12px;\">Looking for teen therapy beyond school stress? <a href=\"teen-therapy.html\" style=\"color:#A98B45;font-weight:800;text-decoration:none;\" style-hover=\"color:#3F3F2E\">See the teen therapy page →<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- THREE STEPS -->\n  <section style=\"padding:76px 0;background:#F5F0E4;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 24px;\">\n      <p style=\"font-size:12px;letter-spacing:4px;text-transform:uppercase;font-weight:800;color:#A98B45;\">No pressure, ever<\u002Fp>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.6vw,40px);font-weight:600;margin-top:10px;\">What happens when you reach out.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px;margin-top:38px;\">\n        <div style=\"background:#FFFFFF;border:1px solid rgba(201,169,97,.4);border-radius:14px;padding:26px;\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:700;color:#C9A961;line-height:1;\">1<\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#3F3F2E;margin-top:8px;\">You send one email<\u002Fh3>\n          <p style=\"font-size:14.5px;color:#5A5A50;margin-top:8px;\">\"School is falling apart and I don't know where to start\" is a perfect first message. You'll hear back within one business day.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid rgba(201,169,97,.4);border-radius:14px;padding:26px;\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:700;color:#C9A961;line-height:1;\">2<\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#3F3F2E;margin-top:8px;\">We talk for 15 minutes<\u002Fh3>\n          <p style=\"font-size:14.5px;color:#5A5A50;margin-top:8px;\">A free call to sort what's therapy, what's school process, and what's both. If I'm not the right fit, you'll leave with a good referral.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid rgba(201,169,97,.4);border-radius:14px;padding:26px;\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:700;color:#C9A961;line-height:1;\">3<\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#3F3F2E;margin-top:8px;\">We make a plan<\u002Fh3>\n          <p style=\"font-size:14.5px;color:#5A5A50;margin-top:8px;\">Sessions for your student, guidance for you, and — with consent — coordination with the school. Online, around school hours.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section style=\"padding:76px 0;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 24px;\">\n      <p style=\"font-size:12px;letter-spacing:4px;text-transform:uppercase;font-weight:800;color:#A98B45;\">Parents ask<\u002Fp>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.6vw,40px);font-weight:600;margin-top:10px;\">The practical questions.<\u002Fh2>\n      <div style=\"max-width:760px;display:flex;flex-direction:column;gap:12px;margin-top:30px;\">\n        <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"3\">\n          <details style=\"background:#FFFFFF;border:1px solid rgba(125,139,116,.25);border-radius:12px;padding:18px 22px;\">\n            <summary style=\"font-weight:800;font-size:15px;cursor:pointer;color:#3F3F2E;min-height:44px;display:flex;align-items:center;\" style-focus=\"outline:3px solid #C9A961;outline-offset:3px;border-radius:6px\">{{ f.q }}<\u002Fsummary>\n            <p style=\"font-size:14.5px;color:#5A5A50;margin-top:10px;\">{{ f.a }}<\u002Fp>\n          <\u002Fdetails>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FINAL CTA -->\n  <section style=\"padding:84px 0;background:linear-gradient(160deg,#3F3F2E 0%,#4A4A35 60%,#5F5F41 100%);color:#F5F0E4;text-align:center;position:relative;overflow:hidden;\">\n    <div style=\"position:absolute;left:50%;top:-220px;transform:translateX(-50%);width:640px;height:640px;border-radius:50%;background:radial-gradient(circle,rgba(232,200,126,.16),rgba(232,200,126,0) 70%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1120px;margin:0 auto;padding:0 24px;\">\n      <p style=\"font-size:12px;letter-spacing:4px;text-transform:uppercase;font-weight:800;color:#DCC08A;\">Bright Room Therapy<\u002Fp>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.6vw,40px);font-weight:600;margin-top:10px;color:#FDFBF3;\">You don't have to figure out the system alone.<\u002Fh2>\n      <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:#DCC08A;margin-top:12px;\">\"A gentle place to begin.\"<\u002Fp>\n      <a href=\"mailto:chandni@brightroomtherapy.com\" style=\"display:inline-flex;align-items:center;min-height:52px;background:#C9A961;color:#3F3F2E;font-size:13.5px;font-weight:800;letter-spacing:1.5px;padding:0 34px;border-radius:30px;text-decoration:none;margin-top:28px;\" style-hover=\"background:#DCC08A\" style-focus=\"outline:3px solid #FDFBF3;outline-offset:3px\">EMAIL CHANDNI<\u002Fa>\n      <p style=\"margin-top:20px;font-size:14px;color:rgba(245,240,228,.8);\">732-334-8416 · chandni@brightroomtherapy.com · Telehealth across New Jersey<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#33331F;color:rgba(245,240,228,.75);padding:34px 0;font-size:12.5px;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 24px 18px;display:flex;gap:8px 22px;flex-wrap:wrap;border-bottom:1px solid rgba(245,240,228,.15);margin-bottom:18px;\">\n      <a href=\"Bright Room Therapy.dc.html\" style=\"color:#DCC08A;text-decoration:none;font-weight:700;\">Home<\u002Fa>\n      <a href=\"teen-therapy.html\" style=\"color:#DCC08A;text-decoration:none;font-weight:700;\">Teen therapy<\u002Fa>\n      <a href=\"first-gen-south-asian-therapy.html\" style=\"color:#DCC08A;text-decoration:none;font-weight:700;\">First-gen &amp; South Asian<\u002Fa>\n      <a href=\"new-mom-therapy.html\" style=\"color:#DCC08A;text-decoration:none;font-weight:700;\">New moms<\u002Fa>\n      <a href=\"parents-school-stress.html\" style=\"color:#DCC08A;text-decoration:none;font-weight:700;\">Parents &amp; school stress<\u002Fa>\n      <a href=\"anxiety-therapy-nj.html\" style=\"color:#DCC08A;text-decoration:none;font-weight:700;\">Anxiety<\u002Fa>\n      <a href=\"young-adult-therapy.html\" style=\"color:#DCC08A;text-decoration:none;font-weight:700;\">Young adults<\u002Fa>\n      <a href=\"grief-therapy.html\" style=\"color:#DCC08A;text-decoration:none;font-weight:700;\">Grief &amp; loss<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n      <div>\n        <div>© 2026 Bright Room Therapy · Resilient Path Counseling, LLC · Chandni Kapadia, LPC — NJ License #37PC01070400<\u002Fdiv>\n        <div style=\"margin-top:6px;\">Good Faith Estimates provided for private-pay clients (No Surprises Act) · <a href=\"privacy-policy.html\" style=\"color:#DCC08A;text-decoration:none;\">Privacy policy<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n      <div>If you're in crisis: call or text <a href=\"tel:988\" style=\"color:#DCC08A;text-decoration:none;\">988<\u002Fa> · or call <a href=\"tel:911\" style=\"color:#DCC08A;text-decoration:none;\">911<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  \n\n  <!-- MOBILE STICKY SCHEDULE BAR -->\n  <div class=\"br-mobile-bar\" style=\"position:fixed;bottom:0;left:0;right:0;z-index:60;background:#3F3F2E;padding:10px 16px calc(10px + env(safe-area-inset-bottom));display:flex;gap:12px;align-items:center;justify-content:space-between;box-shadow:0 -6px 20px rgba(46,46,42,.25);\">\n    <span style=\"color:#FDFBF3;font-size:12.5px;font-weight:700;\">Bright Room Therapy<\u002Fspan>\n    <a href=\"https://care.headway.co/providers/chandni-kapadia-2?utm_source=pem&utm_medium=direct_link&utm_campaign=129002\" style=\"background:#C9A961;color:#3F3F2E;font-size:13px;font-weight:800;letter-spacing:1px;padding:0 22px;border-radius:24px;text-decoration:none;min-height:44px;display:inline-flex;align-items:center;\">SCHEDULE<\u002Fa>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;bookingUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://headway.co/providers/chandni-kapadia&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Conversion&quot; }\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      bookingUrl: this.props.bookingUrl ?? 'https://headway.co/providers/chandni-kapadia',\n      headshotUrl: (window.__resources && window.__resources.headshot) || './chandni-headshot.jpg',\n      signs: [\n        'School mornings are negotiations, then battles, then silence.',\n        'The school suggested a 504 — and handed you a packet, not a plan.',\n        'Homework takes three hours and ends in tears. Theirs or yours.',\n        'Emails from teachers keep piling up, and each one stings.',\n        \"Your kid was fine last year. This year something's different.\",\n        \"You've become the messenger between school and child — and it's breaking you.\",\n      ],\n      faqs: [\n        { q: \"What's the difference between a 504 and an IEP — and which should we ask for?\",\n          a: \"A 504 plan provides accommodations (extra time, breaks, seating) for a student who can access the curriculum; an IEP provides specialized instruction and services through special education. Which fits depends on your child's needs and evaluations. I coordinated 504s for six years — I'll help you understand the process, prepare for meetings, and ask for what's actually useful.\" },\n        { q: 'My kid refuses to go to school. Where do we start?',\n          a: \"Gently, and soon — school avoidance gets stronger the longer it runs. We start with a parent call to map what's driving it (anxiety, social pain, learning struggles, something at school). Then a plan: therapy for your kid, a step-wise return approach, and coordination with the school so everyone pulls in the same direction.\" },\n        { q: 'Do you talk to the school directly?',\n          a: \"Only with your written consent — and when it helps. Sometimes that's a call with the counselor, input for a 504 meeting, or helping you write the email that gets a real response. You stay in control of what's shared.\" },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
